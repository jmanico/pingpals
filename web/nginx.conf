# Static-serve config for the Pingpals SPA runtime image (REQ-FND-002).
# The authoritative security headers / strict CSP are set by the API/edge at the HTTP boundary
# (FE-1.4, SECURITY §1); these are static-asset hardening defaults for the bundle server.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version.
    server_tokens off;

    # Baseline hardening headers for the static surface.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # SPA client-side routing: fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
