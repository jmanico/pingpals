# Pingpals CI — merge-blocking security + coverage gates (REQ-FND-003 / TEST-1.6, SEC-9.2).
#
# GitHub Actions is the resolved CI provider (REQUIREMENTS.md §14), but the gate LOGIC lives in
# provider-agnostic scripts under scripts/ — this workflow is a thin wrapper, so the provider can
# change without rewriting the gates.
#
# Fail closed: every job uses `set -euo pipefail` scripts; an errored/skipped gate is a failure,
# never a pass. Making these jobs REQUIRED status checks (branch protection on `main`) is what
# physically blocks merge — configure that in repo settings (cannot be expressed in this file).
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API gates (SAST · SCA · secret-safe · coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run API CI gates
        run: bash scripts/ci-api.sh

  web:
    name: SPA gates (typecheck · SCA · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run SPA CI gates
        run: bash scripts/ci-web.sh

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install SBOM/audit tooling (hash-pinned) + web deps
        run: |
          python -m pip install --require-hashes --no-deps -r api/requirements-dev.lock.txt
          ( cd web && npm ci --no-audit --no-fund )
      - name: Generate SBOMs
        run: bash scripts/generate-sbom.sh "$RUNNER_TEMP"
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: |
            ${{ runner.temp }}/sbom-api.json
            ${{ runner.temp }}/sbom-web.json
          if-no-files-found: error
